name: cognitrace-extension-ci

on:
  push:
    paths:
      - "cognitrace-extension/**"
      - ".github/workflows/cognitrace-extension-ci.yml"
  pull_request:
    paths:
      - "cognitrace-extension/**"
      - ".github/workflows/cognitrace-extension-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cognitrace-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: cognitrace-extension/.nvmrc
          cache: npm
          cache-dependency-path: cognitrace-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify build quality
        run: npm run ci:verify
